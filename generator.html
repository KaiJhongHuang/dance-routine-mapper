<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排舞圖表產生器</title>
  <style>
    body {
      font-family: -apple-system, "Microsoft JhengHei", sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    .nav { margin-bottom: 16px; }
    .nav a { color: #666; text-decoration: none; font-size: 14px; }
    .nav a:hover { color: #333; }

    .input-area {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .input-area textarea {
      flex: 1;
      height: 200px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      border: 2px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      line-height: 1.6;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: #666;
    }
    .help {
      flex: 0 0 220px;
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
    .help code {
      background: #e0e0e0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    .actions {
      margin-bottom: 24px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #444;
      color: #fff;
    }
    .btn-primary:hover { background: #222; }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    .btn-secondary:hover { background: #ccc; }

    hr { border: none; border-top: 1px solid #ddd; margin: 24px 0; }

    /* === 表格樣式（與 template 一致） === */
    #output { margin-top: 16px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      table-layout: fixed;
    }
    th, td {
      border: 2px solid #fff;
      padding: 12px 8px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #444;
      color: #fff;
      font-weight: 600;
    }
    td.label {
      background: #f0f0f0;
      font-weight: bold;
      width: 50px;
    }
    .c1 { background: #dbeafe; font-weight: 600; }
    .c2 { background: #fef3c7; font-weight: 600; }
    .c3 { background: #d1fae5; font-weight: 600; }
    .c4 { background: #fce7f3; font-weight: 600; }
    .c5 { background: #e9d5ff; font-weight: 600; }
    .c6 { background: #ffedd5; font-weight: 600; }
    .c7 { background: #ccfbf1; font-weight: 600; }
    .c8 { background: #fee2e2; font-weight: 600; }
    .note {
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }

    /* 動作順序 */
    .sequence {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-family: monospace;
      font-size: 15px;
      line-height: 1.8;
    }
    .sequence span.count {
      display: inline-block;
      background: #e0e0e0;
      border-radius: 4px;
      padding: 0 6px;
      margin-right: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="nav"><a href="index.html">&larr; 回首頁</a></div>
  <h1>排舞圖表產生器</h1>
  <p class="subtitle">輸入動作序列，自動產生色彩表格</p>

  <div class="input-area">
    <textarea id="input" placeholder="每行輸入：拍數 + 動作名稱&#10;例如：&#10;6原地基本步&#10;6Sendout&#10;6Change Place&#10;6Call Back&#10;8Mini Dip&#10;&#10;用 --- 分隔不同 Phase">6原地基本步
6Sendout
6Change Place
6Call Back
8Mini Dip</textarea>
    <div class="help">
      <strong>格式說明</strong><br><br>
      每行一個動作：<br>
      <code>拍數</code> + <code>動作名稱</code><br><br>
      例如：<br>
      <code>6原地基本步</code><br>
      <code>8Send Out</code><br>
      <code>10Solo</code><br><br>
      用 <code>---</code> 分隔 Phase<br><br>
      輸入後即時產生表格
    </div>
  </div>

  <div class="actions">
    <button class="btn-secondary" onclick="copyHTML()">複製 HTML</button>
    <button class="btn-secondary" onclick="clearInput()">清除</button>
  </div>

  <div id="output"></div>

  <script>
    const COLORS = ['c1','c2','c3','c4','c5','c6','c7','c8'];

    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');

    inputEl.addEventListener('input', render);
    render();

    function parseMoves(text) {
      const phases = [];
      let current = [];
      for (const raw of text.split('\n')) {
        const line = raw.trim();
        if (!line) continue;
        if (/^-{2,}$/.test(line)) {
          if (current.length) phases.push(current);
          current = [];
          continue;
        }
        const m = line.match(/^(\d+)\s*(.+)$/);
        if (m) {
          current.push({ count: parseInt(m[1]), name: m[2].trim() });
        }
      }
      if (current.length) phases.push(current);
      return phases;
    }

    function buildTable(moves, eightCountOffset) {
      // lay out moves on a beat timeline
      const segments = []; // {start, end, name, colorIdx}
      let beat = 0;
      moves.forEach((mv, i) => {
        segments.push({
          start: beat,
          end: beat + mv.count,
          name: mv.name,
          colorIdx: i % COLORS.length
        });
        beat += mv.count;
      });
      const totalBeats = beat;
      const totalEights = Math.ceil(totalBeats / 8);

      // build rows
      let html = '<table><colgroup><col style="width:50px"><col span="8"></colgroup>';
      html += '<thead><tr><th>8拍</th>';
      for (let c = 1; c <= 8; c++) html += `<th>${c}</th>`;
      html += '</tr></thead><tbody>';

      for (let row = 0; row < totalEights; row++) {
        const rowStart = row * 8;
        const rowEnd = rowStart + 8;
        html += `<tr><td class="label">${row + 1 + eightCountOffset}</td>`;

        let col = rowStart;
        while (col < rowEnd) {
          // find which segment owns this beat
          const seg = segments.find(s => s.start <= col && col < s.end);
          if (!seg) {
            html += '<td></td>';
            col++;
            continue;
          }

          // how many beats of this segment fit in this row
          const segEndInRow = Math.min(seg.end, rowEnd);
          const colspan = segEndInRow - col;
          const cls = COLORS[seg.colorIdx];

          // determine label
          let label = '';
          const startsHere = seg.start === col;
          const endsHere = seg.end <= rowEnd;
          const startedBefore = seg.start < rowStart;
          const continuesAfter = seg.end > rowEnd;

          if (startsHere && endsHere) {
            label = seg.name;
          } else if (startsHere && continuesAfter) {
            label = seg.name + ' ↓';
          } else if (startedBefore && endsHere) {
            label = '↓ ' + seg.name;
          } else if (startedBefore && continuesAfter) {
            label = '↓ ' + seg.name + ' ↓';
          }

          html += `<td class="${cls}" colspan="${colspan}">${label}</td>`;
          col += colspan;
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      return { html, totalEights };
    }

    function buildSequence(moves) {
      let html = '<div class="sequence">';
      moves.forEach((mv, i) => {
        if (i > 0) html += '<br>';
        html += `<span class="count">${mv.count}</span>${mv.name}`;
      });
      html += '</div>';
      return html;
    }

    function render() {
      const phases = parseMoves(inputEl.value);
      if (!phases.length) {
        outputEl.innerHTML = '';
        return;
      }

      let html = '';
      let tableHtml = '';
      let seqHtml = '';
      let offset = 0;

      phases.forEach((moves, pi) => {
        const phaseLabel = phases.length > 1 ? `Phase ${pi + 1}` : 'Phase';
        tableHtml += `<h2>${phaseLabel}</h2>`;
        const result = buildTable(moves, offset);
        tableHtml += result.html;
        offset += result.totalEights;

        seqHtml += `<h2>${phaseLabel} 動作順序</h2>`;
        seqHtml += buildSequence(moves);
      });

      html += tableHtml;
      html += '<p class="note">同色 = 同一個動作 ｜ ↓ = 動作跨越 8 拍邊界延續</p>';
      html += '<hr>';
      html += seqHtml;

      outputEl.innerHTML = html;
    }

    function copyHTML() {
      const html = outputEl.innerHTML;
      if (!html) return;
      navigator.clipboard.writeText(html).then(() => {
        alert('已複製 HTML！');
      });
    }

    function clearInput() {
      inputEl.value = '';
      render();
    }
  </script>

</body>
</html>
