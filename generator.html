<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排舞圖表產生器</title>
  <style>
    body {
      font-family: -apple-system, "Microsoft JhengHei", sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    .nav { margin-bottom: 16px; }
    .nav a { color: #666; text-decoration: none; font-size: 14px; }
    .nav a:hover { color: #333; }

    .input-area {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .input-area textarea {
      flex: 1;
      height: 200px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      border: 2px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      line-height: 1.6;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: #666;
    }
    .help {
      flex: 0 0 220px;
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
    .help code {
      background: #e0e0e0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }

    hr { border: none; border-top: 1px solid #ddd; margin: 24px 0; }

    /* === 表格樣式 === */
    #output { margin-top: 16px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      table-layout: fixed;
    }
    th, td {
      border: 2px solid #fff;
      padding: 12px 8px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #444;
      color: #fff;
      font-weight: 600;
    }
    td.label {
      background: #f0f0f0;
      font-weight: bold;
      width: 50px;
    }
    .c1 { background: #dbeafe; font-weight: 600; }
    .c2 { background: #fef3c7; font-weight: 600; }
    .c3 { background: #d1fae5; font-weight: 600; }
    .c4 { background: #fce7f3; font-weight: 600; }
    .c5 { background: #e9d5ff; font-weight: 600; }
    .c6 { background: #ffedd5; font-weight: 600; }
    .c7 { background: #ccfbf1; font-weight: 600; }
    .c8 { background: #fee2e2; font-weight: 600; }
    .note {
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }

    /* 動作順序 */
    .sequence {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-family: monospace;
      font-size: 15px;
      line-height: 1.8;
    }
    .sequence span.count {
      display: inline-block;
      background: #e0e0e0;
      border-radius: 4px;
      padding: 0 6px;
      margin-right: 8px;
      font-weight: bold;
    }

    .footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="nav"><a href="index.html">&larr; 回首頁</a></div>
  <h1 id="page-title">排舞圖表產生器</h1>
  <p class="subtitle" id="page-subtitle">輸入動作序列，自動產生色彩表格</p>

  <div class="input-area">
    <textarea id="input" placeholder="每行輸入：拍數 + 動作名稱&#10;例如：&#10;T 第一段&#10;6 6 Count Basic&#10;6 Send Out&#10;&#10;T 第二段&#10;8 Swing Out&#10;8 Texas Tommy"></textarea>
    <div class="help">
      <strong>格式說明</strong><br><br>
      每行一個動作：<br>
      <code>拍數</code> + <code>動作名稱</code><br><br>
      例如：<br>
      <code>6 6 Count Basic</code><br>
      <code>8 Send Out</code><br>
      <code>10 Solo</code><br><br>
      用 <code>T 段落名稱</code> 或 <code>---</code><br>分隔不同段落<br><br>
      輸入後即時產生表格
    </div>
  </div>

  <div id="output"></div>

  <div class="footer">v0.9 — Kai, built with Claude Code</div>

  <script>
    const COLORS = ['c1','c2','c3','c4','c5','c6','c7','c8'];

    const PRESETS = {
      default: `T 第一段
6 6 Count Basic
6 Send Out
6 Change Place
6 Call Back
8 Break

T 第二段
8 Swing Out
8 Swing Out
8 Texas Tommy
8 Lindy Circle`,

      'shim-sham': `T Stomp Off
8 Stomp Off (R)
8 Stomp Off (L)
8 Stomp Off (R)
8 Break

T Cross Over
8 Cross Over (R)
8 Cross Over (L)
8 Cross Over (R)
8 Break

T Tack Annie
8 Tack Annie
8 Tack Annie
8 Tack Annie
8 Break

T Half Break
8 Half Break
8 Half Break
8 Half Break
8 Break`,

      'big-apple': `T Part 1
8 Boogie Back
8 Suzy Q
8 Spank the Baby
8 Scarecrow

T Part 2
8 Truckin'
8 Shorty George
8 Pose
8 Praise Allah`
    };

    const TITLES = {
      'shim-sham': { title: 'Shim Sham', subtitle: '經典排舞 — Shim Sham' },
      'big-apple': { title: 'Big Apple', subtitle: '經典排舞 — Big Apple' }
    };

    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');

    // Load preset from URL parameter
    const params = new URLSearchParams(window.location.search);
    const routine = params.get('routine');
    inputEl.value = PRESETS[routine] || PRESETS['default'];

    if (routine && TITLES[routine]) {
      document.getElementById('page-title').textContent = TITLES[routine].title;
      document.getElementById('page-subtitle').textContent = TITLES[routine].subtitle;
      document.title = TITLES[routine].title + ' — 排舞圖表';
    }

    inputEl.addEventListener('input', render);
    render();

    function parseMoves(text) {
      const phases = [];
      let current = [];
      let phaseNames = [];
      let currentName = null;

      for (const raw of text.split('\n')) {
        const line = raw.trim();
        if (!line) continue;

        // Section separator: "T name" or "T" alone or "---"
        const sectionMatch = line.match(/^T(?:\s+(.+))?$/);
        if (sectionMatch || /^-{2,}$/.test(line)) {
          if (current.length) {
            phases.push(current);
            phaseNames.push(currentName);
          }
          current = [];
          currentName = sectionMatch && sectionMatch[1] ? sectionMatch[1].trim() : null;
          continue;
        }

        const m = line.match(/^(\d+)\s+(.+)$/);
        if (m) {
          current.push({ count: parseInt(m[1]), name: m[2].trim() });
        }
      }
      if (current.length) {
        phases.push(current);
        phaseNames.push(currentName);
      }
      return { phases, phaseNames };
    }

    function buildTable(moves, eightCountOffset) {
      const segments = [];
      let beat = 0;
      moves.forEach((mv, i) => {
        segments.push({
          start: beat,
          end: beat + mv.count,
          name: mv.name,
          colorIdx: i % COLORS.length
        });
        beat += mv.count;
      });
      const totalBeats = beat;
      const totalEights = Math.ceil(totalBeats / 8);

      let html = '<table><colgroup><col style="width:50px"><col span="8"></colgroup>';
      html += '<thead><tr><th>8拍</th>';
      for (let c = 1; c <= 8; c++) html += `<th>${c}</th>`;
      html += '</tr></thead><tbody>';

      for (let row = 0; row < totalEights; row++) {
        const rowStart = row * 8;
        const rowEnd = rowStart + 8;
        html += `<tr><td class="label">${row + 1 + eightCountOffset}</td>`;

        let col = rowStart;
        while (col < rowEnd) {
          const seg = segments.find(s => s.start <= col && col < s.end);
          if (!seg) {
            html += '<td></td>';
            col++;
            continue;
          }

          const segEndInRow = Math.min(seg.end, rowEnd);
          const colspan = segEndInRow - col;
          const cls = COLORS[seg.colorIdx];

          let label = '';
          const startsHere = seg.start === col;
          const endsHere = seg.end <= rowEnd;
          const startedBefore = seg.start < rowStart;
          const continuesAfter = seg.end > rowEnd;

          if (startsHere && endsHere) {
            label = seg.name;
          } else if (startsHere && continuesAfter) {
            label = seg.name + ' ↓';
          } else if (startedBefore && endsHere) {
            label = '↓ ' + seg.name;
          } else if (startedBefore && continuesAfter) {
            label = '↓ ' + seg.name + ' ↓';
          }

          html += `<td class="${cls}" colspan="${colspan}">${label}</td>`;
          col += colspan;
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      return { html, totalEights };
    }

    function buildSequence(moves) {
      let html = '<div class="sequence">';
      moves.forEach((mv, i) => {
        if (i > 0) html += '<br>';
        html += `<span class="count">${mv.count}</span>${mv.name}`;
      });
      html += '</div>';
      return html;
    }

    function render() {
      const { phases, phaseNames } = parseMoves(inputEl.value);
      if (!phases.length) {
        outputEl.innerHTML = '';
        return;
      }

      let tableHtml = '';
      let seqHtml = '';
      let offset = 0;

      phases.forEach((moves, pi) => {
        const name = phaseNames[pi];
        let phaseLabel;
        if (name) {
          phaseLabel = name;
        } else if (phases.length > 1) {
          phaseLabel = `Part ${pi + 1}`;
        } else {
          phaseLabel = '';
        }

        if (phaseLabel) {
          tableHtml += `<h2>${phaseLabel}</h2>`;
        }
        const result = buildTable(moves, offset);
        tableHtml += result.html;
        offset += result.totalEights;

        if (phaseLabel) {
          seqHtml += `<h2>${phaseLabel} 動作順序</h2>`;
        } else {
          seqHtml += `<h2>動作順序</h2>`;
        }
        seqHtml += buildSequence(moves);
      });

      let html = tableHtml;
      html += '<p class="note">同色 = 同一個動作 ｜ ↓ = 動作跨越 8 拍邊界延續</p>';
      html += '<hr>';
      html += seqHtml;

      outputEl.innerHTML = html;
    }
  </script>

</body>
</html>
