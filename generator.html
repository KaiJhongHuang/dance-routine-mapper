<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排舞圖表產生器</title>
  <style>
    body {
      font-family: -apple-system, "Microsoft JhengHei", sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    .nav { margin-bottom: 16px; }
    .nav a { color: #666; text-decoration: none; font-size: 14px; }
    .nav a:hover { color: #333; }

    .help {
      color: #999;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .help code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .input-area {
      margin-bottom: 16px;
    }
    .input-area textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      border: 2px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      line-height: 1.6;
      box-sizing: border-box;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: #666;
    }

    hr { border: none; border-top: 1px solid #ddd; margin: 24px 0; }

    /* === 表格樣式 === */
    #output { margin-top: 16px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      table-layout: fixed;
    }
    th, td {
      border: 2px solid #fff;
      padding: 12px 8px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #444;
      color: #fff;
      font-weight: 600;
    }
    td.label {
      background: #f0f0f0;
      font-weight: bold;
      width: 50px;
    }
    .c1 { background: #dbeafe; font-weight: 600; }
    .c2 { background: #fef3c7; font-weight: 600; }
    .c3 { background: #d1fae5; font-weight: 600; }
    .c4 { background: #fce7f3; font-weight: 600; }
    .c5 { background: #e9d5ff; font-weight: 600; }
    .c6 { background: #ffedd5; font-weight: 600; }
    .c7 { background: #ccfbf1; font-weight: 600; }
    .c8 { background: #fee2e2; font-weight: 600; }
    /* Detail view: main row + sub-step row */
    td.main-row { border-bottom: 1px solid rgba(0,0,0,0.08); padding: 8px 4px 4px; }
    td.sub-row {
      font-size: 10px;
      font-weight: 400;
      padding: 2px 4px 6px;
      opacity: 0.7;
    }
    /* Lighter color variants for sub-step row */
    .c1.sub-row { background: #ebf2fe; }
    .c2.sub-row { background: #fef8e0; }
    .c3.sub-row { background: #e4fcf0; }
    .c4.sub-row { background: #fdf0f7; }
    .c5.sub-row { background: #f2e8ff; }
    .c6.sub-row { background: #fff4e6; }
    .c7.sub-row { background: #e0fdf8; }
    .c8.sub-row { background: #fff0f0; }

    /* Sub-step in sequence list */
    .seq-substeps {
      margin-left: 40px;
      font-size: 12px;
      opacity: 0.7;
    }
    .seq-substeps .sub-count {
      font-size: 11px;
      padding: 0 4px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .toolbar button {
      padding: 6px 16px;
      font-size: 13px;
      border: 2px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #666;
      cursor: pointer;
    }
    .toolbar button:hover { border-color: #999; color: #333; }
    .toolbar button.active { background: #444; color: #fff; border-color: #444; }

    /* Routine name */
    .routine-name {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .note {
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }

    /* 動作順序 */
    .sequence {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-family: monospace;
      font-size: 15px;
      line-height: 1.8;
    }
    .sequence span.count {
      display: inline-block;
      background: #e0e0e0;
      border-radius: 4px;
      padding: 0 6px;
      margin-right: 8px;
      font-weight: bold;
    }

    .footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="nav"><a href="index.html">&larr; 回首頁</a></div>
  <h1 id="page-title">排舞圖表產生器</h1>
  <p class="subtitle" id="page-subtitle">輸入動作序列，自動產生色彩表格</p>

  <div class="help">
    第一行為舞序名稱，<code>T 段落名稱</code> 分隔段落，每行 <code>拍數 動作名稱</code><br>
    縮排行為子步法，點「顯示細節」展開
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="舞序名稱&#10;T 第一段&#10;6 6 Count Basic&#10;6 Send Out&#10;&#10;T 第二段&#10;8 Swing Out&#10;8 Texas Tommy"></textarea>
  </div>

  <div class="toolbar">
    <button id="toggleDetail" onclick="toggleDetailView()">顯示細節</button>
    <button onclick="copyText()">複製</button>
    <button onclick="shareUrl()">分享</button>
  </div>
  <div id="output"></div>

  <div class="footer">v1.1 — Kai, built with Claude Code</div>

  <script>
    const COLORS = ['c1','c2','c3','c4','c5','c6','c7','c8'];

    let showDetail = false;

    const PRESETS = {
      default: `Lindy Hop 基本組合
T 第一段
6 6 Count Basic
  2 Rock Step
  2 Triple Step
  2 Triple Step
6 Send Out
  2 Rock Step
  2 Triple Step
  2 Triple Step
6 Change Place
  2 Rock Step
  2 Triple Step
  2 Triple Step
6 Call Back
  2 Rock Step
  2 Triple Step
  2 Triple Step
8 Break

T 第二段
8 Swing Out
  2 Rock Step
  2 Triple Step
  2 Step Step
  2 Triple Step
8 Swing Out
  2 Rock Step
  2 Triple Step
  2 Step Step
  2 Triple Step
8 Texas Tommy
  2 Rock Step
  2 Triple Step
  2 Step Step
  2 Triple Step
8 Lindy Circle
  2 Rock Step
  2 Triple Step
  2 Step Step
  2 Triple Step`,

      'shim-sham': `Shim Sham
T Stomp Off
8 Stomp Off (R)
8 Stomp Off (L)
8 Stomp Off (R)
8 Break

T Cross Over
8 Cross Over (R)
8 Cross Over (L)
8 Cross Over (R)
8 Break

T Tack Annie
8 Tack Annie
8 Tack Annie
8 Tack Annie
8 Break

T Half Break
8 Half Break
8 Half Break
8 Half Break
8 Break`,

      'big-apple': `Big Apple
T Part 1
8 Boogie Back
8 Suzy Q
8 Spank the Baby
8 Scarecrow

T Part 2
8 Truckin'
8 Shorty George
8 Pose
8 Praise Allah`
    };

    const TITLES = {
      'shim-sham': { title: 'Shim Sham', subtitle: '經典排舞 — Shim Sham' },
      'big-apple': { title: 'Big Apple', subtitle: '經典排舞 — Big Apple' }
    };

    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');

    // Load from URL: shared data takes priority, then preset, then default
    const params = new URLSearchParams(window.location.search);
    const sharedData = params.get('data');
    const routine = params.get('routine');
    if (sharedData) {
      try { inputEl.value = decodeURIComponent(atob(sharedData)); } catch(e) { inputEl.value = PRESETS['default']; }
    } else {
      inputEl.value = PRESETS[routine] || PRESETS['default'];
    }

    if (routine && TITLES[routine]) {
      document.getElementById('page-title').textContent = TITLES[routine].title;
      document.getElementById('page-subtitle').textContent = TITLES[routine].subtitle;
      document.title = TITLES[routine].title + ' — 排舞圖表';
    }

    function toggleDetailView() {
      showDetail = !showDetail;
      const btn = document.getElementById('toggleDetail');
      btn.classList.toggle('active', showDetail);
      btn.textContent = showDetail ? '隱藏細節' : '顯示細節';
      render();
    }

    function copyText() {
      navigator.clipboard.writeText(inputEl.value).then(() => {
        const btn = event.target;
        btn.textContent = '已複製';
        setTimeout(() => { btn.textContent = '複製'; }, 1500);
      });
    }

    function shareUrl() {
      const encoded = btoa(encodeURIComponent(inputEl.value));
      const url = location.origin + location.pathname + '?data=' + encoded;
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        btn.textContent = '已複製連結';
        setTimeout(() => { btn.textContent = '分享'; }, 1500);
      });
    }

    inputEl.addEventListener('input', render);
    render();

    function parseMoves(text) {
      const phases = [];
      let current = [];
      let phaseNames = [];
      let currentName = null;
      let routineName = null;
      let firstLine = true;

      for (const raw of text.split('\n')) {
        const trimmed = raw.trim();
        if (!trimmed) continue;

        // First non-empty line: if not a T/--- or move, treat as routine name
        if (firstLine) {
          firstLine = false;
          const isSection = /^T(?:\s|$)/.test(trimmed) || /^-{2,}$/.test(trimmed);
          const isMove = /^\d+\s+.+$/.test(trimmed);
          if (!isSection && !isMove) {
            routineName = trimmed;
            continue;
          }
        }

        // Section separator: "T name" or "T" alone or "---"
        const sectionMatch = trimmed.match(/^T(?:\s+(.+))?$/);
        if (sectionMatch || /^-{2,}$/.test(trimmed)) {
          if (current.length) {
            phases.push(current);
            phaseNames.push(currentName);
          }
          current = [];
          currentName = sectionMatch && sectionMatch[1] ? sectionMatch[1].trim() : null;
          continue;
        }

        // Check if line is indented (sub-step)
        const isIndented = /^\s/.test(raw) && current.length > 0;
        const m = trimmed.match(/^(\d+)\s+(.+)$/);
        if (m) {
          if (isIndented) {
            // Add as sub-step to the last move
            const parent = current[current.length - 1];
            if (!parent.subSteps) parent.subSteps = [];
            parent.subSteps.push({ count: parseInt(m[1]), name: m[2].trim() });
          } else {
            current.push({ count: parseInt(m[1]), name: m[2].trim() });
          }
        }
      }
      if (current.length) {
        phases.push(current);
        phaseNames.push(currentName);
      }
      return { phases, phaseNames, routineName };
    }

    function buildTable(moves, eightCountOffset) {
      // Build main segments (always based on full moves)
      const segments = [];
      let beat = 0;
      moves.forEach((mv, i) => {
        segments.push({
          start: beat,
          end: beat + mv.count,
          name: mv.name,
          colorIdx: i % COLORS.length,
          subSteps: mv.subSteps || null
        });
        beat += mv.count;
      });
      const totalBeats = beat;
      const totalEights = Math.ceil(totalBeats / 8);

      // Build sub-step segments (for detail row)
      const subSegments = [];
      if (showDetail) {
        let sBeat = 0;
        moves.forEach((mv, i) => {
          if (mv.subSteps && mv.subSteps.length) {
            mv.subSteps.forEach(sub => {
              subSegments.push({
                start: sBeat,
                end: sBeat + sub.count,
                name: sub.name,
                colorIdx: i % COLORS.length
              });
              sBeat += sub.count;
            });
          } else {
            // No sub-steps: single empty segment to keep alignment
            subSegments.push({
              start: sBeat,
              end: sBeat + mv.count,
              name: null,
              colorIdx: i % COLORS.length
            });
            sBeat += mv.count;
          }
        });
      }

      let html = '<table><colgroup><col style="width:50px"><col span="8"></colgroup>';
      html += '<thead><tr><th>8拍</th>';
      for (let c = 1; c <= 8; c++) html += `<th>${c}</th>`;
      html += '</tr></thead><tbody>';

      for (let row = 0; row < totalEights; row++) {
        const rowStart = row * 8;
        const rowEnd = rowStart + 8;

        // Check if any segment in this row has sub-steps
        const hasDetailRow = showDetail && segments.some(s =>
          s.start < rowEnd && s.end > rowStart && s.subSteps && s.subSteps.length
        );

        // Main row
        const rowspan = hasDetailRow ? 2 : 1;
        html += `<tr><td class="label" rowspan="${rowspan}">${row + 1 + eightCountOffset}</td>`;

        let col = rowStart;
        while (col < rowEnd) {
          const seg = segments.find(s => s.start <= col && col < s.end);
          if (!seg) {
            html += `<td${hasDetailRow ? ' class="main-row"' : ''}></td>`;
            col++;
            continue;
          }

          const segEndInRow = Math.min(seg.end, rowEnd);
          const colspan = segEndInRow - col;
          const cls = COLORS[seg.colorIdx];

          let label = '';
          const startsHere = seg.start === col;
          const endsHere = seg.end <= rowEnd;
          const startedBefore = seg.start < rowStart;
          const continuesAfter = seg.end > rowEnd;

          if (startsHere && endsHere) {
            label = seg.name;
          } else if (startsHere && continuesAfter) {
            label = seg.name + ' ↓';
          } else if (startedBefore && endsHere) {
            label = '↓ ' + seg.name;
          } else if (startedBefore && continuesAfter) {
            label = '↓ ' + seg.name + ' ↓';
          }

          const extraCls = hasDetailRow ? ' main-row' : '';
          html += `<td class="${cls}${extraCls}" colspan="${colspan}">${label}</td>`;
          col += colspan;
        }
        html += '</tr>';

        // Detail row (sub-steps)
        if (hasDetailRow) {
          html += '<tr>';
          let subCol = rowStart;
          while (subCol < rowEnd) {
            const sub = subSegments.find(s => s.start <= subCol && subCol < s.end);
            if (!sub) {
              html += '<td class="sub-row"></td>';
              subCol++;
              continue;
            }

            const subEndInRow = Math.min(sub.end, rowEnd);
            const colspan = subEndInRow - subCol;
            const cls = COLORS[sub.colorIdx];

            if (sub.name) {
              html += `<td class="${cls} sub-row" colspan="${colspan}">${sub.name}</td>`;
            } else {
              html += `<td class="${cls} sub-row" colspan="${colspan}"></td>`;
            }
            subCol += colspan;
          }
          html += '</tr>';
        }
      }
      html += '</tbody></table>';
      return { html, totalEights };
    }

    function buildSequence(moves) {
      let html = '<div class="sequence">';
      moves.forEach((mv, i) => {
        if (i > 0) html += '<br>';
        html += `<span class="count">${mv.count}</span>${mv.name}`;
        if (showDetail && mv.subSteps && mv.subSteps.length) {
          html += '<div class="seq-substeps">';
          mv.subSteps.forEach(sub => {
            html += `<span class="count sub-count">${sub.count}</span>${sub.name}&nbsp;&nbsp;`;
          });
          html += '</div>';
        }
      });
      html += '</div>';
      return html;
    }

    function render() {
      const { phases, phaseNames, routineName } = parseMoves(inputEl.value);
      if (!phases.length) {
        outputEl.innerHTML = '';
        return;
      }

      let tableHtml = '';
      if (routineName) {
        tableHtml += `<p class="routine-name">${routineName}</p>`;
      }
      let seqHtml = '';
      let offset = 0;

      phases.forEach((moves, pi) => {
        const name = phaseNames[pi];
        let phaseLabel;
        if (name) {
          phaseLabel = name;
        } else if (phases.length > 1) {
          phaseLabel = `Part ${pi + 1}`;
        } else {
          phaseLabel = '';
        }

        if (phaseLabel) {
          tableHtml += `<h2>${phaseLabel}</h2>`;
        }
        const result = buildTable(moves, offset);
        tableHtml += result.html;
        offset += result.totalEights;

        if (phaseLabel) {
          seqHtml += `<h2>${phaseLabel} 動作順序</h2>`;
        } else {
          seqHtml += `<h2>動作順序</h2>`;
        }
        seqHtml += buildSequence(moves);
      });

      let html = tableHtml;
      html += '<p class="note">同色 = 同一個動作 ｜ ↓ = 動作跨越 8 拍邊界延續</p>';
      html += '<hr>';
      html += seqHtml;

      outputEl.innerHTML = html;
    }
  </script>

</body>
</html>
