<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance Routine Mapper</title>
  <style>
    body {
      font-family: -apple-system, "Microsoft JhengHei", sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .routine-list {
      list-style: none;
      padding: 0;
    }
    .routine-list li {
      margin-bottom: 8px;
    }
    .routine-list a {
      display: block;
      padding: 16px 20px;
      background: #f5f5f5;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .routine-list a:hover {
      background: #dbeafe;
    }
    .routine-list .tag {
      display: inline-block;
      background: #e0e0e0;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: normal;
      margin-left: 8px;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>Dance Routine Mapper</h1>
  <p class="subtitle">排舞工具</p>

  <ul class="routine-list">
    <li><a href="generator.html" style="background:#dbeafe;">圖表產生器 <span class="tag">工具</span></a></li>
  </ul>

</body>
</html>
